name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Treat warnings as errors. Cargo caps lints to `allow` for registry deps, so
  # this only bites our own workspace crates (and keeps clippy::pedantic at the
  # `warn` level set in each crate's [lints] table). This is what catches e.g. a
  # Windows-only unused import that is invisible from a Linux-only build.
  RUSTFLAGS: -D warnings

jobs:
  # Dev (non-FIPS) build + test across Linux and Windows. The Windows leg is what
  # actually compiles the #[cfg(windows)] FFI in creds::cng / pac::dpapi.
  test:
    name: dev build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust 1.95.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      # aws-lc-sys (the non-FIPS provider) builds its x86_64 asm with NASM.
      # CMake and a C toolchain are already on both runner images.
      - name: Install NASM (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --workspace

      - name: Test
        run: cargo test --workspace

  # FIPS build + test: routes ALL crypto through the validated aws-lc-fips
  # module. This is the configuration release builds REQUIRE (fips-tls has a
  # compile_error! that fails a non-test release build without `fips`), so it is
  # the artifact that actually ships. aws-lc-fips-sys needs Go in addition to the
  # NASM/CMake/C toolchain used by the dev provider.
  fips:
    name: fips build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust 1.95.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0

      # Separate cache key: the fips build artifacts differ from the dev build's.
      - uses: Swatinem/rust-cache@v2
        with:
          key: fips

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          # Go is only a build tool for aws-lc-fips-sys; there is no Go module,
          # so disable module caching (avoids a spurious "go.sum not found" error).
          cache: false

      - name: Install NASM (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      # Build the shipped artifact (eaphost.dll) with the validated module, not just
      # the fips-tls leaf — `eaphost/fips` enables `fips-tls/fips` for the whole tree.
      - name: Build (fips)
        run: cargo build -p eaphost --features fips

      - name: Test (fips)
        run: cargo test -p eaphost -p fips-tls --features fips
