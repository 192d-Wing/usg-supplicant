version: 2
updates:
  # GitHub Actions used by the CI workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns: ["*"]

  # Rust dependencies across the Cargo workspace (root manifest + Cargo.lock).
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: build
    # Collapse the routine churn into two PRs/week; majors stay separate so
    # breaking bumps get their own review.
    groups:
      cargo-minor:
        update-types: [minor, patch]
